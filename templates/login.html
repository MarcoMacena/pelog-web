<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - PELOG</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1f2e3a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: white;
            width: 360px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.35);
            text-align: center;
        }

        .login-box img {
            width: 120px;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 25px;
            color: #1f2e3a;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1f2e3a;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2f4352;
        }

        .erro {
            color: red;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .usuarios {
            margin-top: 20px;
            font-size: 13px;
            color: #555;
            text-align: left;
            line-height: 1.5;
        }

        .grupo {
            margin-top: 8px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo PELOG">

    <h2>Acesso PELOG</h2>

    {% if erro %}
        <div class="erro">{{ erro }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="usuario" placeholder="Usuário" required>
        <input type="password" name="senha" placeholder="Senha" required>

        <button type="submit">Entrar</button>
    </form>

    <div class="usuarios">
        <strong>Usuários de teste:</strong><br>

        <div class="grupo">
            <strong>Admin:</strong><br>
            admin / admin123
        </div>

        <div class="grupo">
            <strong>Portaria:</strong><br>
            portaria / portaria123
        </div>

        <div class="grupo">
            <strong>Encarregados CD:</strong><br>
            pedro_cd / 123<br>
            jean_cd / 123
        </div>

        <div class="grupo">
            <strong>Encarregados CROSS:</strong><br>
            jalison_cross / 123<br>
            elaine_cross / 123
        </div>
    </div>

</div>

</body>
</html>
