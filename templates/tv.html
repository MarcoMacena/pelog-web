<!DOCTYPE html>
<html>
<head>
    <title>Monitoramento de Docas - PELOG</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #1f2e3a;
            color: white;
            font-family: Arial, sans-serif;
        }

        .titulo {
            text-align: center;
            font-size: 42px;
            font-weight: bold;
            margin: 25px 0;
        }

        .secao-doca {
            background: rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .titulo-doca {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }

        .card-tv {
            background: white;
            color: #1f2e3a;
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.4);
            text-align: center;
        }

        .placa {
            font-size: 28px;
            font-weight: bold;
        }

        .motorista {
            font-size: 20px;
            margin-top: 8px;
        }

        .tempo {
            font-size: 34px;
            font-weight: bold;
            margin-top: 12px;
            padding: 10px;
            border-radius: 12px;
        }

        .tempo-ok {
            background: #d4edda;
            color: #155724;
        }

        .tempo-alerta {
            background: #fff3cd;
            color: #856404;
        }

        .tempo-estourado {
            background: #dc3545;
            color: white;
            animation: piscar 1s infinite;
        }

        @keyframes piscar {
            0% { opacity: 1; }
            50% { opacity: 0.35; }
            100% { opacity: 1; }
        }

        .sem-caminhao {
            font-size: 22px;
            color: #ddd;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="container-fluid px-4">

    <div class="titulo">
        🚛 MONITORAMENTO AO VIVO DAS DOCAS
    </div>

    <div id="dados-tv"></div>

</div>

<script>
function classeTempo(tempo) {
    if (tempo >= 70) {
        return 'tempo-estourado';
    }

    if (tempo >= 60) {
        return 'tempo-alerta';
    }

    return 'tempo-ok';
}

function carregarDados() {
    fetch('/dados_tv')
    .then(res => res.json())
    .then(data => {

        let docas = {};

        data.forEach(c => {
            let nomeDoca = c.doca || 'SEM DOCA';

            if (!docas[nomeDoca]) {
                docas[nomeDoca] = [];
            }

            docas[nomeDoca].push(c);
        });

        let html = '';

        Object.keys(docas).sort().forEach(doca => {

            html += `
                <div class="secao-doca">
                    <div class="titulo-doca">
                        📍 DOCA ${doca}
                    </div>

                    <div class="row">
            `;

            docas[doca].forEach(c => {

                let tempo = Number(c.tempo || 0);
                let classe = classeTempo(tempo);

                html += `
                    <div class="col-md-3">
                        <div class="card-tv">
                            <div class="placa">🚛 ${c.placa}</div>
                            <div class="motorista">👤 ${c.motorista}</div>
                            <div class="motorista">🏢 ${c.empresa || '-'}</div>

                            <div class="tempo ${classe}">
                                ⏱ ${tempo} min
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;
        });

        if (data.length === 0) {
            html = `
                <div class="sem-caminhao">
                    Nenhum caminhão em doca no momento.
                </div>
            `;
        }

        document.getElementById('dados-tv').innerHTML = html;

    });
}

setInterval(carregarDados, 5000);
carregarDados();
</script>

</body>
</html>
