<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Motorista - Expedição</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#1f2e3a;
        }

        .box{
            background:white;
            padding:25px;
            border-radius:15px;
            margin-top:20px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.3);
        }

        .logo{
            width:120px;
        }

        label{
            font-weight:600;
            margin-bottom:5px;
        }
    </style>
</head>

<body>

<div class="container px-4">

    <div class="d-flex justify-content-between align-items-center mt-4">
        <div class="d-flex align-items-center gap-3">
            <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

            <div>
                <h2 class="text-white">
                    Editar Motorista
                </h2>

                <span class="badge bg-primary fs-6">
                    Programação Expedição
                </span>
            </div>
        </div>

        <div class="d-flex gap-2">
            <a href="/cd/programacao-expedicao" class="btn btn-light">
                Voltar
            </a>

            <a href="/logout" class="btn btn-danger">
                Sair
            </a>
        </div>
    </div>

    <div class="box">

        <div class="row mb-4">
            <div class="col-md-4">
                <strong>Destino:</strong><br>
                {{ registro.destino or '-' }}
            </div>

            <div class="col-md-4">
                <strong>Cliente:</strong><br>
                {{ registro.cliente or '-' }}
            </div>

            <div class="col-md-4">
                <strong>Veículo:</strong><br>
                {{ registro.veiculo or '-' }}
            </div>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label>
                    Motorista
                </label>

                <input
                    type="text"
                    name="motorista"
                    class="form-control"
                    value="{{ registro.motorista or '' }}"
                    required>
            </div>

            <button class="btn btn-primary">
                Salvar Motorista
            </button>

            <a href="/cd/programacao-expedicao" class="btn btn-secondary">
                Cancelar
            </a>
        </form>

    </div>

</div>

</body>
</html>
