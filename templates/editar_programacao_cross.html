<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Programação CROSS - PELOG</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#1f2e3a;
        }

        .box{
            background:white;
            padding:25px;
            border-radius:15px;
            margin-top:20px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.3);
        }

        .logo{
            width:120px;
        }

        label{
            font-weight:600;
            margin-bottom:5px;
        }

    </style>

</head>

<body>

<div class="container-fluid px-4">

    <div class="d-flex justify-content-between align-items-center mt-4">

        <div class="d-flex align-items-center gap-3">

            <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

            <div>

                <h2 class="text-white">
                    Editar Programação CROSS
                </h2>

                <span class="badge bg-warning text-dark fs-6">
                    Área Administrativa
                </span>

            </div>

        </div>

        <div class="d-flex gap-2">

            <a href="/admin/programacao-cross" class="btn btn-light">
                Voltar
            </a>

            <a href="/logout" class="btn btn-danger">
                Sair
            </a>

        </div>

    </div>

    <div class="box">

        <form method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>
                        Manifesto
                    </label>

                    <input
                        type="text"
                        name="numero_transporte"
                        class="form-control"
                        value="{{ registro.numero_transporte or '' }}">

                </div>

                <div class="col-md-6 mb-3">

                    <label>
                        Motorista
                    </label>

                    <input
                        type="text"
                        name="nome_motorista"
                        class="form-control"
                        value="{{ registro.nome_motorista or '' }}">

                </div>

                <div class="col-md-6 mb-3">

                    <label>
                        CPF
                    </label>

                    <input
                        type="text"
                        name="chave_acesso"
                        class="form-control"
                        value="{{ registro.chave_acesso or '' }}">

                </div>

                <div class="col-md-6 mb-3">

                    <label>
                        Veículo
                    </label>

                    <input
                        type="text"
                        name="placa_simples_veiculo"
                        class="form-control"
                        value="{{ registro.placa_simples_veiculo or '' }}">

                </div>

            </div>

            <div class="mt-3">

                <button class="btn btn-warning">
                    Salvar Alterações
                </button>

                <a href="/admin/programacao-cross" class="btn btn-secondary">
                    Cancelar
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
